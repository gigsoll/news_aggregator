services:
    db:
        image: postgres:18
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        volumes:
            - postgres:/var/lib/postgresql
        ports:
            - 5432:5432
    backend:
        build: .

volumes:
    postgres:
