services:
    db:
        image: postgres:18
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        volumes:
            - postgres:/var/lib/postgresql
        ports:
            - 5432:5432
        healthcheck:
            test: ["CMD-SHELL", "pg_isready"]
            interval: 10s
            timeout: 5s
            retries: 5
    backend:
        build: .
        depends_on:
            db:
                condition: service_healthy
        develop:
            watch:
                - action: sync
                  path: .
                  target: /app
                  ignore:
                      - ./entrypoint.prod.sh
                      - ./entrypoint.dev.sh
        ports:
            - 8000:8000

volumes:
    postgres:
